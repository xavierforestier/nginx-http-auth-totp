load_module modules/ngx_http_auth_totp_module.so;
server {
    listen 8080;
    location /test01 {
    }
    location /test02 {
        auth_totp_realm "Protected1";
        auth_totp_secret "Secret";
        auth_totp_file /etc/nginx/secret.conf;
    }
    location /test02 {
        auth_totp_realm "Protected2";
        auth_totp_secret "Secret";
        auth_totp_file /etc/nginx/secret.conf;
        auth_totp_length 8;
        auth_totp_reuse off;
        auth_totp_skew 1;
        auth_totp_step 1m;
        auth_totp_cookie "totp-session";
        auth_totp_expiry 1d;
    }
}
