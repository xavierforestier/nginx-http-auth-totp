name: "Tests automation"
on:
  workflow_dispatch:
    inputs:
      nginx-version:
        description: 'nginx version'
        default: "1.29.5"
        required: true
        type: string
jobs:
  tests:    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pre-requisites
        run: |
          sudo apt-get update
          sudo apt install build-essential  curl libpcre2-dev libssl-dev zlib1g-dev libgd-dev nginx -y
      - name: Install nginx sources
        run: |
          curl -fLO --progress-bar https://nginx.org/download/nginx-${{ inputs.nginx-version }}.tar.gz
          tar -xzf nginx-${{ inputs.nginx-version }}.tar.gz
          cd nginx-${{ inputs.nginx-version }}
      - name: Build module
        run: |
          cd nginx-${{ inputs.nginx-version }}
          ./configure --add-module=..
          make
          sudo make install
      
